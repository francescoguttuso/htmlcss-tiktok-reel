<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">
  <link rel="stylesheet" href="style.css">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>
    
    
    <!-- Header -->
    <header class="reel-header">
      <button type="button" class="play" aria-label="Cerca">
        <i class="bi bi-play-btn"></i>
      </button>

      <section class="menu">
        <div class="explore">Esplora</div>
        <div class="followed">Seguiti</div>
        <div class="for-you">Per te</div>
      </section>
      
      <button id="lente">
        <i class="bi bi-search"></i>
      </button>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Pulsante Profilo con tasto "+" -->
      <div class="profile-info">
        <figure class="pic">
          <img src="/assets/img/boolean_logo.png" alt="Profile pic" width="40px">
        </figure>
        <div class="add-btn">+</div>
      </div>

      <!-- Pulsante Like -->
      <div class="action-item">
        <button>
          <i class="bi bi-heart-fill"></i>
        </button>
        <div>588</div>
      </div>

      <!-- Pulsante Commenti -->
      <div class="action-item">
        <button>
          <i class="bi bi-chat-dots-fill"></i>
        </button>
        <div>13</div>
      </div>

      <!-- Pulsante Salva (Preferiti) -->
      <div class="action-item">
        <button>
          <i class="bi bi-bookmark-fill"></i>
        </button>
        <div>638</div>
      </div>

      <!-- Pulsante Condividi -->
      <div class="action-item">
        <button>
          <i class="bi-sign-turn-slight-right-fill"></i>
        </button>
        <div>491</div>
      </div>  
    </div>


    <!-- Footer -->
    <footer>
      <section class="tab-bar">
        <div class="home">
          <button><i class="bi bi-house-fill"></i></button>
          <span>Home</span>
        </div>
        <div class="amici">
          <button><i class="bi bi-people"></i></button>
          <span>Amici</span>
        </div>
        <div class="plus">
          <button><i class="bi bi-plus"></i></button>
        </div>
        <div class="messages">
          <button><i class="bi bi-chat-square"></i></button>
          <span>Posta in arrivo</span>
          <span class="notify">19</span>
        </div>
        <div class="profile">
          <button><i class="bi bi-person"></i></button>
          <span>Profilo</span>
        </div>
        <div class="text">
          <h3>boolean.careers</h3>
          <p>Prova il Fundamentals Camp. 20 ore di corso </p>
          <p>gratuito per...Vedi altro</p>
        </div>
      </section>
    </footer>
  </div>

</body>

</html>
